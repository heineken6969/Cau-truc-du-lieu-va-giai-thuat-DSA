    <script>
        const database = [
            // ==================== I. SINGLY LINKED LIST ====================
            {
                id: "singly-node",
                category: "singly",
                title: "I.1 Định nghĩa Node (Singly)",
                objective: "Xây dựng nền tảng toa tàu một chiều lưu trữ giá trị và liên kết bước tiếp theo.",
                code: `// Định nghĩa cấu trúc tự tham chiếu cho Node Đơn
typedef struct Node {
    int data;           // Ngăn chứa dữ liệu thực tế (Payload)
    struct Node* next;  // Con trỏ lưu địa chỉ của Node tiếp theo
} Node;`,
                rules: "Tạo dữ liệu -> Chừa chỗ móc xích tiếp theo",
                mindmap: "Node Đơn\n├── data: Giá trị thực\n└── next: Trỏ Node kế tiếp",
                flashcard: {
                    q: "Tại sao phải ghi 'struct Node* next' thay vì chỉ 'Node* next'?",
                    a: "Vì tại thời điểm khai báo con trỏ, kiểu đóng gói 'Node' chưa được trình biên dịch biên dịch xong hoàn chỉnh."
                },
                mistake: "Quên ghi dấu ';' ở cuối dòng đóng ngoặc nhọn của struct Node.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "process", text: "Khai báo thành phần data (int)" },
                    { type: "process", text: "Khai báo con trỏ struct Node* next" },
                    { type: "end", text: "Hoàn thành cấu trúc" }
                ]
            },
            {
                id: "singly-create",
                category: "singly",
                title: "I.2 Tạo Node mới (Singly)",
                objective: "Cấp phát động một Node mới trên Heap RAM và khóa an toàn liên kết.",
                code: `Node* createNode(int val) {
    // 1. Cấp phát động ô nhớ kích thước Node
    Node* newNode = (Node*)malloc(sizeof(Node));
    if (newNode == NULL) return NULL; // Phòng hờ RAM đầy
    
    // 2. Điền dữ liệu và khóa liên kết hướng tiến
    newNode->data = val;
    newNode->next = NULL; // Tránh con trỏ hoang dã
    
    return newNode; // Trả về địa chỉ ô nhớ mới
}`,
                rules: "Cấp RAM -> Gán Data -> Khóa NULL đuôi",
                mindmap: "Tạo Node mới\n├── Cấp RAM (malloc)\n├── Gán dữ liệu\n└── Đặt next = NULL",
                flashcard: {
                    q: "Nếu không gán newNode->next = NULL thì có sao không?",
                    a: "Có. Nó sẽ giữ địa chỉ rác ngẫu nhiên, dễ gây sập chương trình khi duyệt."
                },
                mistake: "Không kiểm tra điều kiện (newNode == NULL) dẫn đến lỗi Null Pointer Dereference khi RAM đầy.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "process", text: "Gọi malloc cấp phát Node" },
                    { type: "decision", text: "RAM đầy (newNode == NULL)?" },
                    { type: "process", text: "Gán data = val; next = NULL", branch: "No" },
                    { type: "end", text: "Trả về newNode" },
                    { type: "end", text: "Trả về NULL", branch: "Yes" }
                ]
            },
            {
                id: "singly-traverse",
                category: "singly",
                title: "I.3 Duyệt danh sách (Singly)",
                objective: "Đi qua tuần tự toàn bộ danh sách để đọc payload mà không làm mất dấu mốc head.",
                code: `void printList(Node* head) {
    Node* tmp = head; // Sử dụng con trỏ phụ để di chuyển
    
    while (tmp != NULL) { // Duyệt đến khi chạm điểm rỗng
        printf("%d -> ", tmp->data); // Xử lý dữ liệu tại Node
        tmp = tmp->next; // Nhảy tịnh tiến sang Node kế sau
    }
    printf("NULL\\n");
}`,
                rules: "Đặt tạm tại Head -> Lặp khi khác NULL -> Nhảy bằng next",
                mindmap: "Duyệt danh sách\n├── Dùng biến chạy phụ tmp\n├── Điều kiện: tmp != NULL\n└── Tiến hành nhảy tmp = tmp->next",
                flashcard: {
                    q: "Tại sao không dùng trực tiếp biến 'head' để duyệt?",
                    a: "Nếu dùng head để duyệt, biến head sẽ nhảy về cuối cùng, danh sách sẽ bị mất dấu đầu vĩnh viễn."
                },
                mistake: "Sử dụng nhầm điều kiện dừng là tmp->next != NULL, làm sót mất phần tử cuối cùng chưa in.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "process", text: "Đặt con trỏ tạm tmp = head" },
                    { type: "decision", text: "tmp != NULL?" },
                    { type: "process", text: "In data; Gán tmp = tmp->next", branch: "Yes" },
                    { type: "end", text: "Kết thúc", branch: "No" }
                ]
            },
            {
                id: "singly-add-head",
                category: "singly",
                title: "I.4 Thêm phần tử vào đầu (Singly)",
                objective: "Chèn Node mới làm mốc khởi điểm mới của danh sách một chiều.",
                code: `Node* addAtHead(Node* head, int val) {
    Node* newNode = createNode(val); // Tạo Node mới độc lập
    if (newNode == NULL) return head;
    
    newNode->next = head; // Móc đuôi Node mới vào đầu cũ
    head = newNode;       // Chỉ định Node mới làm đầu mới
    
    return head; // Trả về mốc quản lý đầu mới
}`,
                rules: "Tạo -> Nối đuôi mới vào đầu cũ -> Chuyển head về mới",
                mindmap: "Thêm đầu\n├── Tạo Node mới\n├── newNode->next = head\n└── head = newNode",
                flashcard: {
                    q: "Thứ tự liên kết có thể đảo ngược được không?",
                    a: "Không. Nếu đổi head = newNode trước, bạn sẽ làm mất địa chỉ của toàn bộ danh sách cũ."
                },
                mistake: "Không gán lại giá trị trả về của hàm cho biến đầu danh sách bên ngoài hàm main.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "process", text: "Tạo newNode từ createNode(val)" },
                    { type: "process", text: "newNode->next = head" },
                    { type: "process", text: "head = newNode" },
                    { type: "end", text: "Kết thúc" }
                ]
            },
            {
                id: "singly-add-tail",
                category: "singly",
                title: "I.5 Thêm phần tử vào cuối (Singly)",
                objective: "Dò tìm điểm tận cùng của danh sách và nối thêm toa tàu mới.",
                code: `Node* addAtTail(Node* head, int val) {
    Node* newNode = createNode(val);
    if (newNode == NULL) return head;
    
    if (head == NULL) return newNode; // Rỗng thì làm head luôn
    
    Node* tmp = head;
    while (tmp->next != NULL) { // Dừng lại tại Node cuối cùng
        tmp = tmp->next;
    }
    
    tmp->next = newNode; // Móc đuôi cũ vào đầu mới
    return head;
}`,
                rules: "Nếu trống làm head -> Lặp tìm nút có next bằng NULL -> Móc vào mới",
                mindmap: "Thêm cuối\n├── Check rỗng -> Làm head\n├── Duyệt tìm tmp->next == NULL\n└── Gán tmp->next = newNode",
                flashcard: {
                    q: "Tại sao điều kiện lặp lại là tmp->next != NULL thay vì tmp != NULL?",
                    a: "Vì ta cần dừng chân chính xác ngay tại Node cuối để có quyền thay đổi con trỏ next của nó."
                },
                mistake: "Quên kiểm tra danh sách rỗng (head == NULL) gây ra lỗi crash khi đọc thuộc tính head->next.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "process", text: "Tạo newNode" },
                    { type: "decision", text: "head == NULL?" },
                    { type: "end", text: "Trả về newNode", branch: "Yes" },
                    { type: "process", text: "Duyệt tìm tmp->next == NULL", branch: "No" },
                    { type: "process", text: "tmp->next = newNode" },
                    { type: "end", text: "Trả về head" }
                ]
            },
            {
                id: "singly-add-mid",
                category: "singly",
                title: "I.6 Thêm phần tử vào giữa (Singly)",
                objective: "Chèn thêm Node mới vào phía sau một Node mốc mang dữ liệu flag.",
                code: `Node* addAfter(Node* head, int flag, int val) {
    Node* tmp = head;
    while (tmp != NULL && tmp->data != flag) { // Tìm mốc flag
        tmp = tmp->next;
    }
    
    if (tmp != NULL) { // Tìm thấy mốc chèn
        Node* newNode = createNode(val);
        if (newNode == NULL) return head;
        
        newNode->next = tmp->next; // 1. Móc mới vào nút đứng sau mốc
        tmp->next = newNode;       // 2. Chuyển mốc trỏ sang mới
    }
    return head;
}`,
                rules: "Duyệt tìm mốc flag -> Móc mới vào sau mốc -> Móc mốc sang mới",
                mindmap: "Thêm sau mốc\n├── Quét tìm data == flag\n├── newNode->next = tmp->next\n└── tmp->next = newNode",
                flashcard: {
                    q: "Nếu mốc trùng nút cuối cùng của danh sách thì hàm có hoạt động đúng?",
                    a: "Đúng. Lúc đó newNode->next sẽ nhận giá trị NULL của mốc cuối cũ, danh sách khép đuôi chính xác."
                },
                mistake: "Thay đổi mối nối tmp->next = newNode trước khi gán newNode->next, làm đứt toàn bộ liên lạc phía sau.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "process", text: "Quét tìm tmp->data == flag" },
                    { type: "decision", text: "Tìm thấy mốc (tmp != NULL)?" },
                    { type: "process", text: "Tạo newNode; newNode->next = tmp->next", branch: "Yes" },
                    { type: "process", text: "tmp->next = newNode" },
                    { type: "end", text: "Kết thúc" },
                    { type: "end", text: "Thoát không chèn", branch: "No" }
                ]
            },
            {
                id: "singly-del-head",
                category: "singly",
                title: "I.7 Xóa phần tử ở đầu (Singly)",
                objective: "Cắt bỏ phần tử xuất phát và thu hồi RAM sạch sẽ.",
                code: `Node* deleteHead(Node* head) {
    if (head == NULL) return NULL; // Trống không xóa
    
    Node* toDelete = head; // 1. Giữ địa chỉ đầu cũ
    head = head->next;     // 2. Chuyển giao head sang nút kế
    free(toDelete);        // 3. Giải phóng bộ nhớ động
    
    return head; // Trả về đầu mới
}`,
                rules: "Lưu địa chỉ cũ -> Đổi head sang kế -> Free mốc cũ",
                mindmap: "Xóa đầu\n├── Lưu toDelete = head\n├── head = head->next\n└── free(toDelete)",
                flashcard: {
                    q: "Nếu bỏ quên lệnh free(toDelete) thì có hậu quả gì?",
                    a: "Lỗi rò rỉ bộ nhớ (Memory Leak), vùng nhớ RAM cũ bị chiếm dụng mãi mãi dù không dùng."
                },
                mistake: "Gọi hàm free(head) trước rồi mới dịch chuyển head = head->next, gây lỗi đọc rác bộ nhớ chết.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "decision", text: "head == NULL?" },
                    { type: "end", text: "Thoát ngay", branch: "Yes" },
                    { type: "process", text: "toDelete = head; head = head->next", branch: "No" },
                    { type: "process", text: "free(toDelete)" },
                    { type: "end", text: "Trả về head mới" }
                ]
            },
            {
                id: "singly-del-tail",
                category: "singly",
                title: "I.8 Xóa phần tử ở cuối (Singly)",
                objective: "Tìm nút áp chót để tháo móc xích cuối hàng hiệu quả.",
                code: `Node* deleteTail(Node* head) {
    if (head == NULL) return NULL;
    if (head->next == NULL) { // Chỉ có 1 phần tử
        free(head);
        return NULL;
    }
    
    Node* tmp = head;
    while (tmp->next->next != NULL) { // Tìm nút áp chót (kế cuối)
        tmp = tmp->next;
    }
    
    free(tmp->next); // Giải phóng nút đuôi cũ
    tmp->next = NULL; // Biến nút áp chót thành nút cuối mới
    return head;
}`,
                rules: "Duyệt tìm áp chót (tmp->next->next == NULL) -> Giải phóng đuôi -> Cài áp chót chỉ NULL",
                mindmap: "Xóa cuối\n├── Check 0 hoặc 1 Node\n├── Lặp tìm tmp->next->next == NULL\n├── free(tmp->next)\n└── Đặt tmp->next = NULL",
                flashcard: {
                    q: "Nếu danh sách chỉ có 1 phần tử thì điều kiện tmp->next->next có sập không?",
                    a: "Có. Do đó bắt buộc phải tách riêng điều kiện kiểm tra (head->next == NULL) trước khi chạy vòng lặp."
                },
                mistake: "Dùng điều kiện dừng tmp->next != NULL, tiến thẳng ra đuôi rồi giải phóng làm mất mốc nối áp chót.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "decision", text: "Mô tả danh sách?" },
                    { type: "process", text: "Rỗng hoặc 1 Node: Giải phóng nếu có, trả NULL", branch: "<= 1 Node" },
                    { type: "process", text: "Duyệt tìm tmp->next->next == NULL", branch: "> 1 Node" },
                    { type: "process", text: "free(tmp->next); tmp->next = NULL" },
                    { type: "end", text: "Hoàn tất" }
                ]
            },
            {
                id: "singly-del-mid",
                category: "singly",
                title: "I.9 Xóa phần tử ở giữa (Singly)",
                objective: "Tìm nút mốc và giải phóng phần tử đứng liền kề phía sau nó.",
                code: `Node* deleteAfter(Node* head, int flag) {
    Node* tmp = head;
    while (tmp != NULL && tmp->data != flag) {
        tmp = tmp->next;
    }
    
    if (tmp != NULL && tmp->next != NULL) { // Tồn tại nút sau mốc
        Node* toDelete = tmp->next; // Lưu địa chỉ nút cần xóa
        tmp->next = toDelete->next; // Bắc cầu nối bỏ qua nút xóa
        free(toDelete); // Giải phóng RAM sạch sẽ
    }
    return head;
}`,
                rules: "Tìm mốc flag -> Bắc cầu vượt mốc xóa (tmp->next = toDelete->next) -> Giải phóng",
                mindmap: "Xóa sau mốc\n├── Tìm mốc chứa flag\n├── Lưu toDelete = tmp->next\n├── tmp->next = toDelete->next\n└── free(toDelete)",
                flashcard: {
                    q: "Có thể trực tiếp xóa nút mang giá trị flag trên danh sách liên kết một chiều được không?",
                    a: "Khó hơn rất nhiều, vì cấu trúc một chiều không cho phép ta quay ngược lùi lại nút đứng trước nút flag."
                },
                mistake: "Không kiểm tra điều kiện tmp->next != NULL, dẫn đến lỗi đọc bộ nhớ chết khi mốc nằm ở đuôi.",
                flowchart: [
                    { type: "start", text: "Bắt đầu" },
                    { type: "process", text: "Quét tìm mốc flag" },
                    { type: "decision", text: "Có nút phía sau (tmp->next != NULL)?" },
                    { type: "process", text: "toDelete = tmp->next; tmp->next = toDelete->next", branch: "Yes" },
                    { type: "process", text: "free(toDelete)" },
                    { type: "end", text: "Kết thúc" },
                    { type: "end", text: "Không xóa", branch: "No" }
                ]
            },

            // ==================== II. CIRCULAR LINKED LIST ====================
            {
                id: "circular-node",
                category: "circular",
                title: "II.1 Định nghĩa (Circular)",

                code: `// Cấu trúc tương tự Node đơn nhưng logic khép vòng tuần hoàn

    int data;
    struct Node* next; // Sẽ trỏ ngược lại về head thay vì NULL ở cuối

        function scrollToSection(id) {

        function drawFlowchartVector(canvasId, steps) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;

            // Clear canvas
            ctx.clearRect(0, 0, width, height);

            let currentY = 30;
            const nodeHeight = 40;
            const nodeWidth = 200;
            const centerX = width / 2;

            steps.forEach((step, i) => {
                ctx.save();
                // Thiết kế bóng đổ nhẹ
                ctx.shadowColor = 'rgba(0, 0, 0, 0.4)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 3;

                // Chọn màu sắc cho từng kiểu hình dạng lưu đồ
                let color = '#38bdf8'; // Sky blue mặc định
                if (step.type === 'start' || step.type === 'end') color = '#10b981'; // Emerald
                else if (step.type === 'decision') color = '#eab308'; // Amber

                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.fillStyle = '#0f172a'; // Nền tối đặc trưng

                if (step.type === 'start' || step.type === 'end') {
                    // Vẽ hình con nhộng Oval cho Start/End
                    const r = nodeHeight / 2;
                    ctx.beginPath();
                    ctx.arc(centerX - nodeWidth/2 + r, currentY + r, r, Math.PI/2, Math.PI*1.5);
                    ctx.lineTo(centerX + nodeWidth/2 - r, currentY);
                    ctx.arc(centerX + nodeWidth/2 - r, currentY + r, r, Math.PI*1.5, Math.PI/2);
                    ctx.lineTo(centerX - nodeWidth/2 + r, currentY + nodeHeight);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                } else if (step.type === 'decision') {
                    // Vẽ hình thoi cho Decision
                    ctx.beginPath();
                    ctx.moveTo(centerX, currentY);
                    ctx.lineTo(centerX + nodeWidth/2, currentY + nodeHeight/2);
                    ctx.lineTo(centerX, currentY + nodeHeight);
                    ctx.lineTo(centerX - nodeWidth/2, currentY + nodeHeight/2);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                } else {
                    // Vẽ hình chữ nhật bo góc cho Process
                    const r = 6;
                    ctx.beginPath();
                    ctx.moveTo(centerX - nodeWidth/2 + r, currentY);
                    ctx.arcTo(centerX + nodeWidth/2, currentY, centerX + nodeWidth/2, currentY + nodeHeight, r);
                    ctx.arcTo(centerX + nodeWidth/2, currentY + nodeHeight, centerX - nodeWidth/2, currentY + nodeHeight, r);
                    ctx.arcTo(centerX - nodeWidth/2, currentY + nodeHeight, centerX - nodeWidth/2, currentY, r);
                    ctx.arcTo(centerX - nodeWidth/2, currentY, centerX + nodeWidth/2, currentY, r);
                    ctx.closePath();
                    ctx.fill();
                    ctx.stroke();
                }

                // Vẽ text
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;
                ctx.fillStyle = '#f8fafc';
                ctx.font = '11px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Cắt chữ nếu quá dài
                let text = step.text;
                if (text.length > 28) text = text.substring(0, 26) + "..";
                ctx.fillText(text, centerX, currentY + nodeHeight/2);

                // Vẽ mũi tên hướng đi tiếp theo
                if (i < steps.length - 1) {
                    ctx.strokeStyle = '#64748b';
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(centerX, currentY + nodeHeight);
                    ctx.lineTo(centerX, currentY + nodeHeight + 25);
                    ctx.stroke();

                    // Đầu mũi tên
                    ctx.fillStyle = '#64748b';
                    ctx.beginPath();
                    ctx.moveTo(centerX - 4, currentY + nodeHeight + 21);
                    ctx.lineTo(centerX + 4, currentY + nodeHeight + 21);
                    ctx.lineTo(centerX, currentY + nodeHeight + 25);
                    ctx.closePath();
                    ctx.fill();

                    // Vẽ ghi chú cho rẽ nhánh Yes/No nếu có
                    if (step.branch) {
                        ctx.fillStyle = '#eab308';
                        ctx.font = 'bold 9px Inter, sans-serif';
                        ctx.fillText(step.branch, centerX + 18, currentY + nodeHeight + 12);
                    }
                }

                ctx.restore();
                currentY += nodeHeight + 25;
            });
        }

                                    </h4>
                                    <p class="text-sm font-medium text-slate-200">Q: ${item.flashcard.q}</p>
                                </div>
                                <div class="mt-4 pt-3 border-t border-slate-800/60 no-print">
                                    <button onclick="toggleAnswer(this)" class="px-3 py-1 bg-slate-800 hover:bg-slate-700 transition text-[11px] font-bold text-slate-300 rounded border border-slate-700">Xem đáp án</button>
                                    <p class="text-xs text-emerald-400 mt-2 font-semibold hidden answer-panel">${item.flashcard.a}</p>
                                </div>
                                <div class="mt-4 pt-3 border-t border-slate-800/60 hidden print:block">
                                    <p class="text-xs text-emerald-400 font-semibold">A: ${item.flashcard.a}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                container.appendChild(section);

                // Chạy vẽ vector flowchart bằng Canvas lập tức sau khi render DOM
                setTimeout(() => {
                    drawFlowchartVector(`canvas-${item.id}`, item.flowchart);
                }, 50);
            });
        }

        function highlightCode(code) {
            return code
                .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                // Highlight comment
                .replace(/(\/\/.*)/g, '<span class="text-slate-500 italic">$1</span>')
                // Highlight keywords
                .replace(/\b(typedef|struct|int|void|if|else|while|do|return|NULL|sizeof|free|malloc)\b/g, '<span class="text-emerald-400 font-bold">$1</span>')
                // Highlight pointers
                .replace(/(\w+\s*\*)/g, '<span class="text-sky-400">$1</span>')
                // Highlight functions
                .replace(/(\w+)(?=\()/g, '<span class="text-amber-400 font-semibold">$1</span>');
        }

        function toggleAnswer(btn) {
            const panel = btn.nextElementSibling;
            if (panel.classList.contains('hidden')) {
                panel.classList.remove('hidden');
                btn.innerText = 'Ẩn đáp án';
            } else {
                panel.classList.add('hidden');
                btn.innerText = 'Xem đáp án';
            }
        }

        function toggleViewMode() {
            const sidebar = document.getElementById('sidebar');
            const mainContent = document.getElementById('main-content-area');
            const btn = document.getElementById('viewModeBtn');

            if (sidebar.classList.contains('no-print')) {
                sidebar.classList.remove('no-print');
                sidebar.classList.add('hidden');
                mainContent.classList.remove('p-4', 'md:p-8');
                mainContent.classList.add('p-0', 'bg-slate-950');
                btn.innerHTML = `<i class="fa-solid fa-window-restore"></i> <span>Chế độ Tương Tác</span>`;
            } else {
                sidebar.classList.add('no-print');
                sidebar.classList.remove('hidden');
                mainContent.classList.add('p-4', 'md:p-8');
                mainContent.classList.remove('p-0', 'bg-slate-950');
                btn.innerHTML = `<i class="fa-solid fa-book-open"></i> <span>Chế độ Giáo Trình (In PDF)</span>`;
            }
        }

        // Nạp dữ liệu ban đầu
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
